name: "hello_world_case_fix"
limit: 10000
memory_size: 8192
memory_mapped_io:
  0x80: [72, 101, 108, 108, 79, 32, 119, 111, 114, 76, 68, 10]  # "HellO worLD\n"
  0x84: []
reports:
  - name: Step-by-step
    slice: all
    view: |
      {pc}: {instruction} {pc:label}
  - name: Result
    slice: last
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
      symio[0x80]: {io:0x80:sym}
      symio[0x84]: {io:0x84:sym}
      {memory:0:31}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [72,101,108,108,111,32,119,111,114,108,100]
      symio[0x80]: "" >>> ""
      symio[0x84]: "" >>> "Hello world"
      mem[0..31]:     48 65 6c 6c 6f 20 77 6f 72 6c 64 00 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f